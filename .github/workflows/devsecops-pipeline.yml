name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  IMAGE_NAME: medaminehlali/gitops-sonarqube-aks-pipeline
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  sast_sonar_scan:
    name: SAST and SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_and_push_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sast_sonar_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG
  scan_container_image:
    name: Scan Container Image
    runs-on: ubuntu-latest
    needs: build_and_push_docker
    continue-on-error: true

    steps:
      - name: Scan Docker Image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  update_k8s_manifest:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest
    needs: scan_container_image
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update deployment image
        run: |
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit and Push manifest update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${IMAGE_NAME}:${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
          git push
name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: emekaezedozie276/devsecops-aks-pipeline
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  sast_sonar_scan:
    name: SAST and SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        run: |
          docker run --rm \
            -e SONAR_HOST_URL="${SONAR_HOST_URL}" \
            -e SONAR_TOKEN="${SONAR_TOKEN}" \
            -v "${GITHUB_WORKSPACE}:/usr/src" \
            sonarsource/sonar-scanner-cli:latest
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_and_push_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sast_sonar_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG

  scan_container_image:
    name: Scan Container Image
    runs-on: ubuntu-latest
    needs: build_and_push_docker
    continue-on-error: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scan Docker Image with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.53.0 image \
            --format table \
            --exit-code 0 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            ${IMAGE_NAME}:${IMAGE_TAG}

  update_k8s_manifest:
    name: Update Kubernetes Manifest
    runs-on: ubuntu-latest
    needs: scan_container_image
    if: always()
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update deployment image
        run: |
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit and Push manifest update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "Update image to ${IMAGE_NAME}:${IMAGE_TAG} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

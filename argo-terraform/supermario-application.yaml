apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supermario-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ike-DevCloudIQ/devsecops-aks-pipeline.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      enabled: true
      prune: false
      selfHeal: false

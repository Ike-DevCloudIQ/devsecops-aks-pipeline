apiVersion: apps/v1
kind: Deployment
metadata:
  name: supermario-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supermario-app
  template:
    metadata:
      labels:
        app: supermario-app
    spec:
      containers:
      - name: supermario
        image: medaminehlali/gitops-sonarqube-aks-pipeline:2
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
          requests:
            memory: "64Mi"
            cpu: "250m"